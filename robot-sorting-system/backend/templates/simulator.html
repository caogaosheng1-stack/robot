<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UR5 机器人分拣系统 — 动力学仿真平台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Share+Tech+Mono&display=swap');
:root{--bg:#070b14;--panel:#0c1220;--border:#162035;--accent:#00e5ff;--accent2:#ff5722;--green:#00e676;--red:#ff1744;--blue:#448aff;--yellow:#ffea00;--purple:#d500f9;--text:#b0c4de;--muted:#3a5068;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans SC','Share Tech Mono',monospace;}
body{display:grid;grid-template-rows:44px 1fr;grid-template-columns:1fr 330px;grid-template-areas:"hdr hdr" "main side";}
header{grid-area:hdr;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 14px;}
header h1{font-size:.82rem;font-weight:700;letter-spacing:2px;color:var(--accent);white-space:nowrap;}
header h1 span{color:var(--accent2);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s,box-shadow .3s;}
.dot.run{background:var(--green);box-shadow:0 0 10px var(--green);}
.dot.err{background:var(--red);box-shadow:0 0 10px var(--red);}
.hstat{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted);white-space:nowrap;}
.hstat b{color:var(--accent);}
.hdr-btns{margin-left:auto;display:flex;gap:6px;}
.btn{padding:4px 12px;border:1px solid var(--border);border-radius:2px;background:transparent;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.68rem;cursor:pointer;letter-spacing:1px;transition:all .15s;text-transform:uppercase;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.start{border-color:var(--green);color:var(--green);}
.btn.start:hover{background:var(--green);color:#000;}
.btn.stop{border-color:var(--red);color:var(--red);}
.btn.stop:hover{background:var(--red);color:#fff;}
.btn.export{border-color:var(--purple);color:var(--purple);}
.btn.export:hover{background:var(--purple);color:#fff;}
.btn:disabled{opacity:.2;cursor:not-allowed;}
#main{grid-area:main;display:grid;grid-template-rows:1fr 190px;overflow:hidden;}
#canvasWrap{position:relative;overflow:hidden;}
#threeCanvas{display:block;width:100%!important;height:100%!important;}
#overlayInfo{position:absolute;top:10px;left:12px;font-family:'Share Tech Mono',monospace;font-size:.54rem;color:var(--muted);pointer-events:none;line-height:1.9;}
#overlayInfo b{color:var(--accent);}
#chartsRow{display:grid;grid-template-columns:1fr 1fr 1fr;background:#080d18;border-top:1px solid var(--border);gap:1px;}
.chart-cell{background:#080d18;padding:4px 8px;display:flex;flex-direction:column;}
.chart-label{font-family:'Share Tech Mono',monospace;font-size:.5rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;flex-shrink:0;}
.chart-cell canvas{flex:1;min-height:0;}
aside{grid-area:side;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel{border-bottom:1px solid var(--border);padding:8px 12px;flex-shrink:0;}
.ptitle{font-size:.55rem;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;}
.arm-card{background:#080d1a;border:1px solid var(--border);border-radius:4px;padding:7px 9px;margin-bottom:5px;}
.arm-hdr{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.arm-id{font-size:.7rem;font-weight:700;color:var(--accent);font-family:'Share Tech Mono',monospace;}
.arm-phase{font-size:.5rem;padding:2px 5px;border-radius:2px;background:var(--border);color:var(--text);letter-spacing:.5px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.arm-phase.idle{color:var(--muted);}
.arm-phase.moving_to_item{color:var(--yellow);background:#1a1400;}
.arm-phase.descending,.arm-phase.placing{color:var(--accent2);background:#1a0800;}
.arm-phase.gripping{color:var(--green);background:#001a08;}
.arm-phase.lifting{color:var(--accent);background:#001520;}
.arm-phase.moving_to_bin{color:#bb88ff;background:#150a28;}
.arm-phase.returning{color:var(--muted);}
.joint-row{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;margin-top:3px;}
.jv{background:#0a1020;border:1px solid var(--border);border-radius:2px;text-align:center;padding:2px 0;font-size:.5rem;color:var(--accent);font-family:'Share Tech Mono',monospace;}
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .15s linear;}
.bins-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.bin-card{background:#080d1a;border:1px solid var(--border);border-radius:4px;padding:6px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:.56rem;}
.bin-lbl{font-size:.62rem;font-weight:700;margin-bottom:3px;}
.bin-lbl.c0{color:var(--red);}.bin-lbl.c1{color:var(--green);}.bin-lbl.c2{color:var(--blue);}.bin-lbl.c3{color:var(--yellow);}
.bin-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:3px 0;}
.bin-fill{height:100%;border-radius:3px;transition:width .3s;}
.bin-fill.c0{background:var(--red);}.bin-fill.c1{background:var(--green);}.bin-fill.c2{background:var(--blue);}.bin-fill.c3{background:var(--yellow);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.stat-item{background:#080d1a;border:1px solid var(--border);border-radius:3px;padding:4px 7px;font-family:'Share Tech Mono',monospace;}
.slbl{font-size:.48rem;color:var(--muted);}
.sval{font-size:.7rem;color:var(--accent);font-weight:700;}
.log-title{padding:8px 12px 3px;font-size:.52rem;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;flex-shrink:0;}
#logBox{flex:1;overflow-y:auto;padding:6px 12px;font-family:'Share Tech Mono',monospace;font-size:.54rem;line-height:1.85;}
#logBox::-webkit-scrollbar{width:3px;}#logBox::-webkit-scrollbar-thumb{background:var(--border);}
.le{color:var(--muted);}.le.ok{color:var(--green);}.le.err{color:var(--red);}.le.info{color:var(--accent);}
</style>
</head>
<body>
<header>
  <div class="dot" id="dot"></div>
  <h1>UR5 <span>机器人</span>分拣系统 &mdash; 动力学仿真平台</h1>
  <div class="hstat">仿真时间 <b id="hTime">0.0s</b></div>
  <div class="hstat">帧率 <b id="hFps">0</b></div>
  <div class="hstat">环境物品 <b id="hItems">0</b></div>
  <div class="hstat">已分拣 <b id="hSorted">0</b></div>
  <div class="hstat">准确率 <b id="hAcc">0%</b></div>
  <div class="hdr-btns">
    <button class="btn start" id="btnStart" onclick="startSim()">&#9654; 启动</button>
    <button class="btn stop" id="btnStop" onclick="stopSim()" disabled>&#9632; 停止</button>
    <button class="btn export" id="btnExport" onclick="exportCharts()" disabled>&#8659; 导出图表</button>
  </div>
</header>
<div id="main">
  <div id="canvasWrap">
    <canvas id="threeCanvas"></canvas>
    <div id="overlayInfo">
      <div>拖拽旋转 &middot; 滚轮缩放 &middot; 右键平移</div>
      <div style="margin-top:5px">模型: <b>Universal Robots UR5</b> | 自由度: <b>6</b> | 臂展: <b>850mm</b></div>
    </div>
  </div>
  <div id="chartsRow">
    <div class="chart-cell"><div class="chart-label">关节角轨迹 &mdash; ARM-0 (deg)</div><canvas id="cJoint0"></canvas></div>
    <div class="chart-cell"><div class="chart-label">关节扭矩 &mdash; ARM-0 (N&middot;m)</div><canvas id="cTorque0"></canvas></div>
    <div class="chart-cell"><div class="chart-label">末端执行器 XYZ &mdash; ARM-0 (mm)</div><canvas id="cEE0"></canvas></div>
  </div>
</div>
<aside>
  <div class="panel">
    <div class="ptitle">&#9656; UR5 机械臂状态</div>
    <div id="armsC"><div style="color:var(--muted);font-size:.58rem">等待仿真启动…</div></div>
  </div>
  <div class="panel">
    <div class="ptitle">&#9656; 分拣箱</div>
    <div class="bins-grid" id="binsC"></div>
  </div>
  <div class="panel">
    <div class="ptitle">&#9656; 系统统计</div>
    <div class="stat-grid" id="statsC"></div>
  </div>
  <div class="log-title">&#9656; 系统日志</div>
  <div id="logBox"></div>
</aside>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
'use strict';
var canvas=document.getElementById('threeCanvas');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.setClearColor(0x070b14);
var scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x070b14,0.025);
var camera=new THREE.PerspectiveCamera(50,1,0.05,200);
camera.position.set(6,5,9);camera.lookAt(0,1,0);
function onResize(){
  var cw=document.getElementById('canvasWrap');
  var w=cw.clientWidth,h=cw.clientHeight;
  renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();
}
window.addEventListener('resize',onResize);onResize();
scene.add(new THREE.AmbientLight(0x1a2a44,0.9));
var sun=new THREE.DirectionalLight(0xffffff,0.85);sun.position.set(8,14,6);sun.castShadow=true;scene.add(sun);
var fill=new THREE.DirectionalLight(0x00e5ff,0.22);fill.position.set(-6,8,-4);scene.add(fill);
var ptA=new THREE.PointLight(0x00e5ff,1.4,14);ptA.position.set(-4,3.5,0);scene.add(ptA);
var ptB=new THREE.PointLight(0xff5722,1.1,14);ptB.position.set(4,3.5,0);scene.add(ptB);
var M={
  ground:new THREE.MeshLambertMaterial({color:0x060a12}),
  gridL:new THREE.LineBasicMaterial({color:0x111e33,transparent:true,opacity:0.4}),
  belt:new THREE.MeshLambertMaterial({color:0x0e1420}),
  stripe:new THREE.MeshLambertMaterial({color:0x182030}),
  rail:new THREE.MeshPhongMaterial({color:0x16202e,shininess:60}),
  body:new THREE.MeshPhongMaterial({color:0x14202e,shininess:90,specular:0x00aaff}),
  joint:new THREE.MeshPhongMaterial({color:0x0c1420,shininess:140,specular:0x00e5ff}),
  eff:new THREE.MeshPhongMaterial({color:0x00e5ff,shininess:220,specular:0xffffff,emissive:0x002230,emissiveIntensity:0.6}),
  binR:new THREE.MeshPhongMaterial({color:0xff1744,shininess:50,transparent:true,opacity:0.4}),
  binG:new THREE.MeshPhongMaterial({color:0x00e676,shininess:50,transparent:true,opacity:0.4}),
  binB:new THREE.MeshPhongMaterial({color:0x448aff,shininess:50,transparent:true,opacity:0.4}),
  binY:new THREE.MeshPhongMaterial({color:0xffea00,shininess:50,transparent:true,opacity:0.4})
};
function mk(g,m,cs,rs){cs=cs!==false;rs=rs===true;var mesh=new THREE.Mesh(g,m);mesh.castShadow=cs;mesh.receiveShadow=rs;return mesh;}
function cyl(a,b,h,s){return new THREE.CylinderGeometry(a,b,h,s||16);}
function box(w,h,d){return new THREE.BoxGeometry(w,h,d);}
function sph(r){return new THREE.SphereGeometry(r,14,14);}
var gnd=mk(new THREE.PlaneGeometry(30,30),M.ground,false,true);gnd.rotation.x=-Math.PI/2;scene.add(gnd);
(function(){var pts=[],h=15;for(var i=-h;i<=h;i++){pts.push(-h,0,i,h,0,i,i,0,-h,i,0,h);}var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));scene.add(new THREE.LineSegments(geo,M.gridL));})();
var convG=new THREE.Group();
var beltMesh=mk(box(12,0.14,1.5),M.belt,false,true);beltMesh.position.set(0,0.07,0);convG.add(beltMesh);
[-0.82,0.82].forEach(function(z){var r=mk(box(12,0.22,0.07),M.rail);r.position.set(0,0.19,z);convG.add(r);});
var beltStripes=[];
for(var bx=-5.5;bx<=5.5;bx+=0.55){var bs=mk(box(0.035,0.005,1.3),M.stripe,false);bs.position.set(bx,0.145,0);convG.add(bs);beltStripes.push(bs);}
[-5.5,-2.5,0,2.5,5.5].forEach(function(x){var leg=mk(cyl(0.055,0.075,0.55,8),M.rail);leg.position.set(x,-0.2,0);convG.add(leg);var foot=mk(box(0.3,0.04,0.3),M.rail);foot.position.set(x,-0.47,0);convG.add(foot);});
scene.add(convG);
var BIN_MATS=[M.binR,M.binG,M.binB,M.binY];
var BIN_POS=[[-4.5,0,-2.4],[-1.5,0,-2.4],[1.5,0,-2.4],[4.5,0,-2.4]];
var BIN_NAMES=['0号箱','1号箱','2号箱','3号箱'];
var BIN_COLORS=['#ff1744','#00e676','#448aff','#ffea00'];
function buildBin(mat){
  var g=new THREE.Group(),w=1.4,h=0.9,d=1.2,t=0.06;
  function side(geo,x,y,z){var m=mk(geo,mat);m.position.set(x,y,z);g.add(m);}
  side(box(w,t,d),0,t/2,0);side(box(w,h,t),0,h/2,-d/2);side(box(w,h*0.55,t),0,h*0.275,d/2);
  side(box(t,h,d),-w/2,h/2,0);side(box(t,h,d),w/2,h/2,0);return g;
}
BIN_POS.forEach(function(p,i){var b=buildBin(BIN_MATS[i]);b.position.set(p[0],p[1],p[2]);scene.add(b);});
BIN_POS.forEach(function(p,i){
  var c2=document.createElement('canvas');c2.width=160;c2.height=36;
  var ctx=c2.getContext('2d');ctx.font='bold 18px monospace';ctx.fillStyle=BIN_COLORS[i];ctx.textAlign='center';ctx.fillText(BIN_NAMES[i],80,26);
  var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c2),transparent:true}));
  sp.scale.set(1.4,0.32,1);sp.position.set(p[0],1.5,p[2]);scene.add(sp);
});
function buildUR5(){
  var root=new THREE.Group();
  var ped=mk(cyl(0.12,0.15,0.18,16),M.body);ped.position.y=0.09;root.add(ped);
  var j0=new THREE.Group();j0.position.y=0.18;root.add(j0);
  var disc=mk(cyl(0.11,0.11,0.06,16),M.joint);disc.position.y=0.03;j0.add(disc);
  var j1=new THREE.Group();j1.position.y=0.09;j0.add(j1);
  j1.add(mk(sph(0.09),M.joint));
  var l2=new THREE.Group();l2.position.y=0.045;j1.add(l2);
  var ua=mk(cyl(0.055,0.065,0.42,14),M.body);ua.position.y=0.21;l2.add(ua);
  var j2=new THREE.Group();j2.position.y=0.42;l2.add(j2);j2.add(mk(sph(0.075),M.joint));
  var l3=new THREE.Group();l3.position.y=0.038;j2.add(l3);
  var fa=mk(cyl(0.045,0.055,0.39,14),M.body);fa.position.y=0.195;l3.add(fa);
  var j3=new THREE.Group();j3.position.y=0.39;l3.add(j3);j3.add(mk(sph(0.056),M.joint));
  var l4=new THREE.Group();l4.position.y=0.028;j3.add(l4);
  var w1=mk(cyl(0.038,0.038,0.12,12),M.body);w1.position.y=0.06;l4.add(w1);
  var j4=new THREE.Group();j4.position.y=0.12;l4.add(j4);j4.add(mk(sph(0.048),M.joint));
  var l5=new THREE.Group();l5.position.y=0.024;j4.add(l5);
  var w2=mk(cyl(0.034,0.034,0.10,12),M.body);w2.position.y=0.05;l5.add(w2);
  var j5=new THREE.Group();j5.position.y=0.10;l5.add(j5);
  var eb=mk(cyl(0.04,0.04,0.06,12),M.eff);eb.position.y=0.03;j5.add(eb);
  [-1,1].forEach(function(s){var f=mk(cyl(0.012,0.008,0.07,8),M.eff);f.position.set(s*0.03,0.095,0);j5.add(f);});
  var ringMat=new THREE.MeshPhongMaterial({color:0x00e5ff,emissive:0x00e5ff,emissiveIntensity:0.8,transparent:true,opacity:0.7});
  var rg=new THREE.Mesh(new THREE.TorusGeometry(0.042,0.008,8,24),ringMat);
  rg.rotation.x=Math.PI/2;rg.position.y=0.07;j5.add(rg);
  root.userData.joints=[j0,j1,l2,j2,l4,j5];root.userData.ring=rg;
  return root;
}
var ARM_POS=[[-3,0.16,-1.2],[3,0.16,-1.2]];
var armMeshes=[];
ARM_POS.forEach(function(p){var a=buildUR5();a.position.set(p[0],p[1],p[2]);scene.add(a);armMeshes.push(a);});
var itemPool=[];
var ITEM_COLORS=[0xff1744,0x00e676,0x448aff,0xffea00];
function spawnItem(){
  if(itemPool.length>=16)return;
  var geos=[new THREE.BoxGeometry(0.18,0.18,0.18),new THREE.SphereGeometry(0.10,10,10),new THREE.CylinderGeometry(0.07,0.07,0.2,10),new THREE.ConeGeometry(0.10,0.22,8)];
  var m=new THREE.Mesh(geos[Math.floor(Math.random()*4)],new THREE.MeshPhongMaterial({color:ITEM_COLORS[Math.floor(Math.random()*4)],shininess:120}));
  m.castShadow=true;m.position.set(5.5,0.25,(Math.random()-0.5)*0.8);
  m.userData.vel=-0.012-Math.random()*0.006;m.userData.alive=true;scene.add(m);itemPool.push(m);
}
for(var si=0;si<6;si++){spawnItem();if(itemPool.length)itemPool[itemPool.length-1].position.x=-4+si*1.8;}
var ctrl={rotating:false,panning:false,lastX:0,lastY:0,theta:0.9,phi:0.52,radius:12,target:new THREE.Vector3(0,1,0)};
function updateCam(){var x=ctrl.target.x+ctrl.radius*Math.sin(ctrl.phi)*Math.sin(ctrl.theta),y=ctrl.target.y+ctrl.radius*Math.cos(ctrl.phi),z=ctrl.target.z+ctrl.radius*Math.sin(ctrl.phi)*Math.cos(ctrl.theta);camera.position.set(x,y,z);camera.lookAt(ctrl.target);}
updateCam();
canvas.addEventListener('mousedown',function(e){if(e.button===0)ctrl.rotating=true;else if(e.button===2)ctrl.panning=true;ctrl.lastX=e.clientX;ctrl.lastY=e.clientY;});
window.addEventListener('mouseup',function(){ctrl.rotating=false;ctrl.panning=false;});
window.addEventListener('mousemove',function(e){var dx=e.clientX-ctrl.lastX,dy=e.clientY-ctrl.lastY;ctrl.lastX=e.clientX;ctrl.lastY=e.clientY;
  if(ctrl.rotating){ctrl.theta-=dx*0.008;ctrl.phi=Math.max(0.05,Math.min(1.5,ctrl.phi-dy*0.008));updateCam();}
  else if(ctrl.panning){var r=new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0),new THREE.Vector3().subVectors(camera.position,ctrl.target)).normalize();ctrl.target.addScaledVector(r,dx*0.012);ctrl.target.addScaledVector(new THREE.Vector3(0,1,0),-dy*0.012);updateCam();}});
canvas.addEventListener('wheel',function(e){ctrl.radius=Math.max(2,Math.min(30,ctrl.radius+e.deltaY*0.015));updateCam();},{passive:true});
canvas.addEventListener('contextmenu',function(e){e.preventDefault();});
var clock=new THREE.Clock(),fpsCount=0,fpsTimer=0,fps=0,simRunning=false;
function applyJoints(arm,a){var j=arm.userData.joints;if(!j||!a||a.length<6)return;
  j[0].rotation.y=a[0];j[1].rotation.z=a[1];j[2].rotation.z=a[2];j[3].rotation.z=a[3];j[4].rotation.y=a[4];j[5].rotation.z=a[5];}
function idleWave(arm,t,i){var j=arm.userData.joints;if(!j)return;
  j[0].rotation.y=Math.sin(t*0.4+i*3.14)*0.3;j[1].rotation.z=-0.4+Math.sin(t*0.6+i)*0.15;
  j[2].rotation.z=0.6+Math.sin(t*0.5)*0.10;j[3].rotation.z=-0.3+Math.sin(t*0.7)*0.08;j[4].rotation.y=Math.sin(t*0.9+i)*0.2;}
function animate(){
  requestAnimationFrame(animate);
  var dt=clock.getDelta(),t=clock.getElapsedTime();
  fpsCount++;fpsTimer+=dt;
  if(fpsTimer>=0.5){fps=Math.round(fpsCount/fpsTimer);fpsCount=0;fpsTimer=0;document.getElementById('hFps').textContent=fps;}
  beltStripes.forEach(function(s){s.position.x-=dt*0.9;if(s.position.x<-6.3)s.position.x+=12.1;});
  for(var ii=itemPool.length-1;ii>=0;ii--){var it=itemPool[ii];
    if(!it.userData.alive){scene.remove(it);itemPool.splice(ii,1);continue;}
    it.position.x+=it.userData.vel;it.rotation.y+=0.02;
    if(it.position.x<-6.5){scene.remove(it);itemPool.splice(ii,1);}}
  if(Math.random()<0.007)spawnItem();
  armMeshes.forEach(function(arm,i){
    if(!simRunning)idleWave(arm,t,i);
    var rg=arm.userData.ring;
    if(rg){rg.material.emissiveIntensity=0.5+0.5*Math.sin(t*3+i*3.14);rg.material.opacity=0.5+0.3*Math.sin(t*2+i);}
  });
  ptA.intensity=1.3+0.3*Math.sin(t*2.3);
  ptB.intensity=1.1+0.2*Math.sin(t*1.7+1);
  renderer.render(scene,camera);
}
animate();
// ================================================================
//  Chart.js 动力学图表初始化
// ================================================================
var JCOLORS=['#00e5ff','#ff5722','#00e676','#ffea00','#d500f9','#ff1744'];
var JLABELS=['J1','J2','J3','J4','J5','J6'];
Chart.defaults.color='#3a5068';
Chart.defaults.borderColor='#162035';
function makeChart(id,label,datasets){
  var ctx=document.getElementById(id).getContext('2d');
  return new Chart(ctx,{
    type:'line',
    data:{labels:[],datasets:datasets},
    options:{
      animation:false,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{boxWidth:8,font:{size:9},color:'#4a6080'}},tooltip:{enabled:false}},
      scales:{
        x:{display:false},
        y:{ticks:{font:{size:9},color:'#3a5068'},grid:{color:'#0e1828'}}
      },
      elements:{point:{radius:0},line:{borderWidth:1.2}}
    }
  });
}
var chartJoint=makeChart('cJoint0','关节角',JLABELS.map(function(l,i){
  return{label:l,data:[],borderColor:JCOLORS[i],backgroundColor:'transparent',tension:0.3};
}));
var chartTorque=makeChart('cTorque0','扭矩',JLABELS.map(function(l,i){
  return{label:l,data:[],borderColor:JCOLORS[i],backgroundColor:'transparent',tension:0.3};
}));
var chartEE=makeChart('cEE0','末端',[
  {label:'X',data:[],borderColor:'#00e5ff',backgroundColor:'transparent',tension:0.3},
  {label:'Y',data:[],borderColor:'#ff5722',backgroundColor:'transparent',tension:0.3},
  {label:'Z',data:[],borderColor:'#00e676',backgroundColor:'transparent',tension:0.3}
]);
var MAX_PTS=120;
function pushChart(chart,newSets){
  newSets.forEach(function(vals,i){
    if(i<chart.data.datasets.length){
      var d=chart.data.datasets[i].data;
      vals.forEach(function(v){d.push(v);});
      while(d.length>MAX_PTS)d.shift();
    }
  });
  chart.data.labels=chart.data.datasets[0].data.map(function(_,i){return i;});
  chart.update('none');
}
// ================================================================
//  UI 渲染函数
// ================================================================
var logLines=[];
function sysLog(msg,cls){
  logLines.push({msg:msg,cls:cls||'info'});
  if(logLines.length>80)logLines.shift();
  var box=document.getElementById('logBox');
  box.innerHTML=logLines.map(function(l){return '<div class="le '+l.cls+'"'+'>'+l.msg+'</div>';}).join('');
  box.scrollTop=box.scrollHeight;
}
function renderBins(counts){
  var names=['红色箱','绿色箱','蓝色箱','黄色箱'],cls=['c0','c1','c2','c3'];
  var max=Math.max.apply(null,counts.concat([1]));
  document.getElementById('binsC').innerHTML=counts.map(function(n,i){
    return '<div class="bin-card"><div class="bin-lbl '+cls[i]+'"'+'>'+names[i]+'</div>'
      +'<div class="bin-bar"><div class="bin-fill '+cls[i]+'" style="width:'+Math.round(n/max*100)+'%"></div></div>'
      +'<div style="color:var(--muted);font-size:.5rem">'+n+' 件</div></div>';
  }).join('');
}
function renderStats(d){
  var items=[
    {l:'总分拣量',v:d.sorted||0},
    {l:'准确率',v:(+(d.acc||0)).toFixed(1)+'%'},
    {l:'已处理',v:d.processed||0},
    {l:'平均周期',v:(+(d.cycle||0)).toFixed(2)+'s'},
    {l:'仿真时长',v:(+(d.simT||0)).toFixed(1)+'s'},
    {l:'在线物品',v:d.items||0}
  ];
  document.getElementById('statsC').innerHTML=items.map(function(it){
    return '<div class="stat-item"><div class="slbl">'+it.l+'</div><div class="sval">'+it.v+'</div></div>';
  }).join('');
}
var PHASE_ZH={idle:'空闲',moving_to_item:'移向物品',descending:'下降',gripping:'抓取',lifting:'提升',moving_to_bin:'移向箱子',placing:'放置',returning:'归位'};
function renderArms(arms){
  var c=document.getElementById('armsC');
  if(!arms||!arms.length){c.innerHTML='<div style="color:var(--muted);font-size:.58rem">无臂数据</div>';return;}
  c.innerHTML=arms.map(function(arm){
    var j=arm.joints||[0,0,0,0,0,0];
    var prog=arm.move_progress!=null?Math.round(arm.move_progress*100):0;
    var phase=arm.phase||'idle';
    var hasItem=arm.has_item?' ●':'';
    var bat=arm.battery!=null?Math.round(arm.battery)+'%':'';
    return '<div class="arm-card">'
      +'<div class="arm-hdr">'
      +'<span class="arm-id">ARM-'+arm.id+'</span>'
      +'<span class="arm-phase '+phase+'"+'+'\u003e'+(PHASE_ZH[phase]||phase)+hasItem+'</span>'
      +(bat?'<span style="margin-left:auto;color:var(--muted);font-size:.48rem">'+bat+'</span>':'')
      +'</div>'
      +'<div class="joint-row">'+j.map(function(v,k){return '<div class="jv">J'+(k+1)+'<br>'+(v*57.3).toFixed(0)+'°</div>';}).join('')+'</div>'
      +'<div class="pbar"><div class="pfill" style="width:'+prog+'%"></div></div>'
      +'</div>';
  }).join('');
  arms.forEach(function(arm,i){
    if(armMeshes[i]&&arm.joints&&arm.joints.length>=6)applyJoints(armMeshes[i],arm.joints);
  });
}
// ================================================================
//  数据拉取 + 图表更新
// ================================================================
var pollTimer=null;
var _seenMsgs={};
function poll(){
  fetch('/api/data').then(function(r){return r.json();}).then(function(d){
    var running=d.status==='running',errored=d.status==='error';
    var dot=document.getElementById('dot');
    dot.className='dot'+(running?' run':(errored?' err':''));
    var td=d.time_data||{};
    document.getElementById('hTime').textContent=(+(td.simulation_time||0)).toFixed(1)+'s';
    var st=d.stats||{};
    var sorted=+(st.successful_sorts||0);
    var accStr=st.accuracy_rate||'0%';var acc=parseFloat(accStr)||0;
    document.getElementById('hItems').textContent=+(st.items_in_environment||(d.items||[]).length||0);
    document.getElementById('hSorted').textContent=sorted;
    document.getElementById('hAcc').textContent=acc.toFixed(1)+'%';
    if(d.robots&&d.robots.length)renderArms(d.robots);
    var bins=d.bins||[];var counts=[0,0,0,0];
    bins.forEach(function(b){if(b.id>=0&&b.id<4)counts[b.id]=b.current_count||0;});
    renderBins(counts);
    renderStats({sorted:sorted,acc:acc,processed:+(st.total_items_processed||0),cycle:+(st.avg_cycle_time||0),simT:+(td.simulation_time||0),items:+(st.items_in_environment||(d.items||[]).length||0)});
    var msgs=d.messages||[];
    msgs.forEach(function(m){if(m&&!_seenMsgs[m]){_seenMsgs[m]=true;var cls='info';if(m.indexOf('错误')>=0||m.indexOf('❌')>=0)cls='err';else if(m.indexOf('✅')>=0||m.indexOf('完成')>=0||m.indexOf('成功')>=0)cls='ok';sysLog(m,cls);}});
    if(d.status==='completed'||d.status==='error'){
      if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
      simRunning=false;
      document.getElementById('btnStart').disabled=false;
      document.getElementById('btnStop').disabled=true;
      sysLog('仿真结束 — 状态: '+d.status,errored?'err':'ok');
    }
  }).catch(function(){document.getElementById('dot').className='dot err';});
  // 每4次poll拉取一次历史图表数据
  if(typeof poll._cnt==='undefined')poll._cnt=0;
  poll._cnt++;
  if(poll._cnt%4===0){
    fetch('/api/history').then(function(r){return r.json();}).then(function(h){
      if(!h||!h.time||!h.time.length)return;
      var j0=h.joints_0||[];
      if(j0.length===6)pushChart(chartJoint,j0);
      var t0=h.torque_0||[];
      if(t0.length===6)pushChart(chartTorque,t0);
      var ee0=h.ee_0||{};
      if(ee0.x)pushChart(chartEE,[ee0.x,ee0.y,ee0.z]);
      document.getElementById('btnExport').disabled=false;
    }).catch(function(){});
  }
}
function startSim(){
  document.getElementById('btnStart').disabled=true;
  document.getElementById('btnStop').disabled=false;
  simRunning=true;_seenMsgs={};
  document.getElementById('dot').className='dot run';
  sysLog('['+new Date().toLocaleTimeString()+'] 正在启动仿真...','info');
  fetch('/api/start',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){sysLog('启动失败: '+d.error,'err');document.getElementById('btnStart').disabled=false;document.getElementById('btnStop').disabled=true;simRunning=false;return;}
      sysLog('仿真启动成功 ✅','ok');
      if(!pollTimer)pollTimer=setInterval(poll,500);
      poll();
    })
    .catch(function(){
      sysLog('[演示模式] 后端未连接 — 3D视图运行中','info');
      var demoN=0;
      if(!pollTimer)pollTimer=setInterval(function(){
        demoN+=Math.random()<0.3?1:0;
        var t=clock.getElapsedTime();
        document.getElementById('hTime').textContent=t.toFixed(1)+'s';
        var bc=[0,0,0,0];for(var i=0;i<demoN;i++)bc[i%4]++;
        renderBins(bc);
        renderStats({sorted:demoN,acc:92+Math.random()*6,processed:demoN,cycle:0.8+Math.random()*0.2,simT:t,items:itemPool.length});
      },600);
    });
}
function stopSim(){
  fetch('/api/stop',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).catch(function(){});
  simRunning=false;
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnStop').disabled=true;
  document.getElementById('dot').className='dot';
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  sysLog('['+new Date().toLocaleTimeString()+'] 仿真已停止','err');
}
function exportCharts(){
  var names=['关节角轨迹_ARM0','关节扭矩_ARM0','末端轨迹_ARM0'];
  var charts=[chartJoint,chartTorque,chartEE];
  charts.forEach(function(ch,i){
    var a=document.createElement('a');
    a.href=ch.toBase64Image('image/png',1.0);
    a.download=names[i]+'_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.png';
    a.click();
  });
  // 同时导出 CSV
  var rows=[['时间(s)','J1(deg)','J2(deg)','J3(deg)','J4(deg)','J5(deg)','J6(deg)','扭矩J1(Nm)','扭矩J2(Nm)','扭矩J3(Nm)','扭矩J4(Nm)','扭矩J5(Nm)','扭矩J6(Nm)','EE_X(mm)','EE_Y(mm)','EE_Z(mm)']];
  var n=chartJoint.data.datasets[0].data.length;
  for(var i=0;i<n;i++){
    var row=[i];
    chartJoint.data.datasets.forEach(function(ds){row.push(ds.data[i]!=null?ds.data[i].toFixed(3):'');});
    chartTorque.data.datasets.forEach(function(ds){row.push(ds.data[i]!=null?ds.data[i].toFixed(3):'');});
    chartEE.data.datasets.forEach(function(ds){row.push(ds.data[i]!=null?ds.data[i].toFixed(1):'');});
    rows.push(row);
  }
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='UR5动力学数据_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.csv';
  a.click();
  sysLog('图表已导出 (PNG x3 + CSV)','ok');
}

renderBins([0,0,0,0]);
renderStats({sorted:0,acc:0,processed:0,cycle:0,simT:0,items:0});
sysLog('Three.js r'+THREE.REVISION+' 场景就绪','info');
sysLog('Chart.js 图表初始化完成','info');
sysLog('点击「启动」开始 UR5 分拣仿真','info');
</script>
